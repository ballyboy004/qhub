<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q · HUB</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060606;--surface:#0d0d0d;--border:#1c1c1c;
  --text:#c8c8c8;--muted:#444;--accent:#c8ff00;
  --accent-dim:rgba(200,255,0,0.08);--red:#ff4444;--green:#44ff88;
  --blue:#4488ff;--purple:#aa88ff;--orange:#ffaa44;
}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;padding:32px 28px 64px;max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.logo{font-size:11px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.wordmark{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.02em}
.wordmark span{color:var(--accent)}
.clock-block{text-align:right}
.clock{font-size:28px;font-weight:300;color:#fff;letter-spacing:0.05em;font-variant-numeric:tabular-nums}
.date{font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-top:4px;text-transform:uppercase}
.section-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* SMART TASKS */
.smart-tasks{margin-bottom:40px}
.dump-area{width:100%;font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);outline:none;resize:none;min-height:72px;line-height:1.6;transition:border-color 0.15s;display:block}
.dump-area:focus{border-color:#333}
.dump-area::placeholder{color:var(--muted)}
.dump-row{display:flex;gap:8px;margin-top:8px;margin-bottom:16px;flex-wrap:wrap}
.dump-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;padding:9px 16px;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.12s;white-space:nowrap}
.dump-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.dump-btn.primary:hover{opacity:0.85}
.dump-btn.primary:disabled{opacity:0.4;cursor:not-allowed}
.dump-btn.recording{background:var(--red);color:#fff;border-color:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.processing{font-size:11px;color:var(--muted);padding:8px 0;display:none}
.processing.active{display:block}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{display:grid;grid-template-columns:12px 1fr auto;align-items:start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;transition:border-color 0.15s}
.task-item:hover{border-color:#2a2a2a}
.task-item.done-task{opacity:0.4}
.task-item.done-task .task-title{text-decoration:line-through}
.pdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.p1{background:var(--red)}.p2{background:var(--orange)}.p3{background:var(--green)}
.task-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.task-cat{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600}
.task-ts{font-size:9px;color:var(--muted)}
.task-title{font-size:13px;color:#ddd;line-height:1.5}
.task-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
.task-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.task-check{background:none;border:1px solid var(--border);border-radius:4px;width:22px;height:22px;cursor:pointer;color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.task-check:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.task-item.done-task .task-check{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.task-del{background:none;border:none;color:transparent;cursor:pointer;font-size:12px;padding:0;line-height:1;transition:color 0.12s}
.task-item:hover .task-del{color:var(--muted)}
.task-del:hover{color:var(--red)!important}
.tasks-empty{font-size:11px;color:var(--muted);padding:10px 0}

/* MISSIONS */
.missions{margin-bottom:40px}
.mission-grid{display:flex;flex-direction:column;gap:8px}
.mission{display:grid;grid-template-columns:80px 1fr 80px 120px;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;transition:border-color 0.15s}
.mission:hover{border-color:#2a2a2a}
.mission.done{border-color:var(--accent);background:var(--accent-dim)}
.mission-tag{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600}
.mission-label{font-size:13px;color:#ddd}
.mission.done .mission-label{color:var(--accent)}
.mission-count{font-size:13px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.mission-btns{display:flex;gap:6px;justify-content:flex-end}
.btn-inc,.btn-dec{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.12s}
.btn-inc:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-dec:hover{background:#1a1a1a;color:var(--text)}
.bar-row{display:flex;align-items:center;gap:12px;margin-top:10px;margin-bottom:24px}
.bar-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease}
.bar-label{font-size:11px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}

/* TOOLS */
.tools{margin-bottom:40px}
.tool-category{margin-bottom:28px}
.tool-category-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.tool-card{display:block;text-decoration:none;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;transition:all 0.15s;cursor:pointer;position:relative;overflow:hidden}
.tool-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:0;transition:opacity 0.15s}
.tool-card:hover{border-color:#333;transform:translateY(-1px)}
.tool-card:hover::before{opacity:1}
.tool-card.offline{opacity:0.4;cursor:default}
.tool-card.offline:hover{transform:none;border-color:var(--border)}
.tool-card.offline::before{display:none}
.tool-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px}
.tool-desc{font-size:11px;color:var(--muted);line-height:1.5}
.tool-status{margin-top:10px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--green)}
.tool-status.local{color:#ffcc00}
.tool-status.offline-s{color:var(--muted)}

/* FOOTER */
.footer{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid var(--border)}
.footer-text{font-size:10px;color:#2a2a2a;letter-spacing:0.15em;text-transform:uppercase}
.reset-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;background:none;border:none;color:#2a2a2a;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s}
.reset-btn:hover{color:var(--red)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.header{animation:fadeUp 0.4s ease both}
.smart-tasks{animation:fadeUp 0.4s ease 0.03s both}
.missions{animation:fadeUp 0.4s ease 0.06s both}
.tools{animation:fadeUp 0.4s ease 0.09s both}

@media(max-width:600px){
  html,body{padding:20px 16px 40px}
  .mission{grid-template-columns:60px 1fr;grid-template-rows:auto auto}
  .mission-count{display:none}
  .clock{font-size:20px}
  .wordmark{font-size:22px}
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="logo">Samuel Quinn Gilmore</div>
    <div class="wordmark">Q<span>·</span>HUB</div>
  </div>
  <div class="clock-block">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date"></div>
  </div>
</header>

<section class="smart-tasks">
  <div class="section-label"><span>Smart tasks</span></div>
  <textarea class="dump-area" id="dump-area" placeholder="Dump your thoughts — voice note, random ideas, things you need to do. Claude turns it into prioritized tasks."></textarea>
  <div class="dump-row">
    <button class="dump-btn" id="voice-btn" onclick="toggleVoice()">🎙 Voice</button>
    <button class="dump-btn primary" id="process-btn" onclick="processDump()">⚡ Process into tasks</button>
    <button class="dump-btn" onclick="clearDone()" style="margin-left:auto">Clear done</button>
  </div>
  <div class="processing" id="proc-ind">⚡ Processing your thoughts...</div>
  <div class="task-list" id="task-list"></div>
</section>

<section class="missions">
  <div class="section-label">Daily missions</div>
  <div class="bar-row">
    <div class="bar-track"><div class="bar-fill" id="main-bar" style="width:0%"></div></div>
    <div class="bar-label" id="main-label">0 / 5 complete</div>
  </div>
  <div class="mission-grid" id="mission-grid"></div>
</section>

<section class="tools">
  <div class="section-label">Tools</div>
  <div id="tools-container"></div>
</section>

<footer class="footer">
  <div class="footer-text">Resets at midnight · noctive.io</div>
  <button class="reset-btn" onclick="resetDay()">Reset today</button>
</footer>

<script>
// ── CONFIG — hardcoded, no setup needed ───────────────────────────────────────
const SECRET = 'qhub-samuel-2026-noctive'; // matches QHUB_SECRET in Vercel

const MISSIONS = [
  {id:'jobs',    tag:'Income',  label:'Apply to 5 jobs',            goal:5, color:'#ffcc00'},
  {id:'emails',  tag:'Noctive', label:'Check email campaign',        goal:1, color:'#4488ff'},
  {id:'beat',    tag:'Music',   label:'Make a beat',                 goal:1, color:'#aa88ff'},
  {id:'network', tag:'Network', label:'Reach out to 5 producers',   goal:5, color:'#44ff88'},
  {id:'promo',   tag:'Promo',   label:'Hit 5 influencers for promo', goal:5, color:'#ff44aa'},
];

const TOOL_CATS = [
  { label:'Noctive — outreach', color:'#4488ff', tools:[
    {name:'Lead Engine',      desc:'Qualify → Generate → Export', url:'https://noctive-lead-engine-dztnw3c87n2iz5tyse52aw.streamlit.app/', status:'live'},
    {name:'Instantly',        desc:'Email campaign dashboard',    url:'https://app.instantly.ai',                                         status:'live'},
    {name:'Noctive Site',     desc:'noctive.io — live',           url:'https://noctive.io',                                               status:'live'},
  ]},
  { label:'Music — network', color:'#44ff88', tools:[
    {name:'Network Finder', desc:'Producer credits + IG links', url:'https://blkbox-network.vercel.app/', status:'live'},
  ]},
  { label:'Promo — growth', color:'#ff44aa', tools:[
    {name:'Influencer Scout', desc:'TikTok creators by hashtag', url:'https://blkbx-influencer-scout-90osf6fud.vercel.app/', status:'live'},
  ]},
  { label:'Income — jobs', color:'#ffcc00', tools:[
    {name:'Job Scout', desc:'Temecula jobs · run locally', url:'http://localhost:8000', status:'local'},
  ]},
];

const CAT_COLORS = {
  Noctive:'#4488ff',Music:'#aa88ff',Income:'#ffcc00',
  Network:'#44ff88',Promo:'#ff44aa',BLACKBOX:'#c8ff00',Life:'#c8c8c8',General:'#666',
};

// ── STORAGE ───────────────────────────────────────────────────────────────────
const DAY_KEY   = 'qhub_v1';
const TASKS_KEY = 'qhub_tasks_v2';

function todayStr(){ return new Date().toISOString().slice(0,10); }
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(DAY_KEY)||'{}'); if(s.date===todayStr()) return s.counts||{}; }catch(e){}
  return {};
}
function saveState(c){ localStorage.setItem(DAY_KEY, JSON.stringify({date:todayStr(),counts:c})); }
let counts = loadState();

function loadTasks(){ try{ return JSON.parse(localStorage.getItem(TASKS_KEY)||'[]'); }catch(e){ return []; } }
function saveTasks(t){ localStorage.setItem(TASKS_KEY, JSON.stringify(t)); }
let tasks = loadTasks();

// ── API HELPERS ───────────────────────────────────────────────────────────────
// All requests go to /api/* on Vercel — no client-side keys needed
function authH(){
  return {'Content-Type':'application/json','x-qhub-token': SECRET};
}

// ── VOICE ─────────────────────────────────────────────────────────────────────
let recognition=null, isRecording=false;
function toggleVoice(){
  const btn=document.getElementById('voice-btn');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Voice requires Chrome.'); return; }
  if(isRecording){ recognition.stop(); return; }
  recognition=new SR();
  recognition.continuous=true; recognition.interimResults=false; recognition.lang='en-US';
  recognition.onstart  = ()=>{ isRecording=true;  btn.textContent='⏹ Stop'; btn.classList.add('recording'); };
  recognition.onresult = (e)=>{
    let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript+' ';
    const a=document.getElementById('dump-area'); a.value=(a.value+' '+t.trim()).trim();
  };
  recognition.onend  = ()=>{ isRecording=false; btn.textContent='🎙 Voice'; btn.classList.remove('recording'); };
  recognition.onerror= ()=>{ isRecording=false; btn.textContent='🎙 Voice'; btn.classList.remove('recording'); };
  recognition.start();
}

// ── PROCESS DUMP ──────────────────────────────────────────────────────────────
// Sends raw text to /api/voice on Vercel — Claude processes server-side
async function processDump(){
  const raw=document.getElementById('dump-area').value.trim();
  if(!raw){ alert('Nothing to process.'); return; }

  const btn=document.getElementById('process-btn');
  const ind=document.getElementById('proc-ind');
  btn.disabled=true; ind.classList.add('active');

  try {
    const res = await fetch('/api/voice',{
      method:'POST', headers:authH(),
      body:JSON.stringify({text: raw}),
    });
    if(!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error||'Unknown error');

    // Sync fresh tasks from server
    await syncFromServer();
    document.getElementById('dump-area').value='';

  } catch(e){
    alert('Error: '+e.message);
    console.error(e);
  } finally {
    btn.disabled=false; ind.classList.remove('active');
  }
}

// ── SERVER SYNC ───────────────────────────────────────────────────────────────
async function syncFromServer(){
  try {
    const res=await fetch('/api/tasks',{headers:authH()});
    if(!res.ok) return;
    const serverTasks=await res.json();
    if(!Array.isArray(serverTasks)||serverTasks.length===0) return;
    // Merge: server is source of truth, keep any local-only tasks
    const serverIds=new Set(serverTasks.map(t=>t.id));
    const localOnly=tasks.filter(t=>!serverIds.has(t.id));
    tasks=[...serverTasks,...localOnly];
    saveTasks(tasks); renderTasks();
  } catch(e){}
}

// ── TASK RENDER ───────────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTasks(){
  const list=document.getElementById('task-list');
  const v=[...tasks.filter(t=>!t.done),...tasks.filter(t=>t.done)];
  if(!v.length){ list.innerHTML='<div class="tasks-empty">No tasks yet. Dump your thoughts and hit Process.</div>'; return; }
  list.innerHTML=v.map(t=>`
    <div class="task-item${t.done?' done-task':''}">
      <div class="pdot p${t.priority}"></div>
      <div>
        <div class="task-meta">
          <span class="task-cat" style="color:${CAT_COLORS[t.category]||'#666'}">${t.category}</span>
          <span class="task-ts">${t.date} ${t.time}</span>
        </div>
        <div class="task-title">${esc(t.title)}</div>
        ${t.note?`<div class="task-note">${esc(t.note)}</div>`:''}
      </div>
      <div class="task-actions">
        <button class="task-check" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
        <button class="task-del" onclick="deleteTask('${t.id}')">×</button>
      </div>
    </div>`).join('');
}

async function toggleTask(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.done=!t.done; saveTasks(tasks); renderTasks();
  try{ await fetch('/api/tasks',{method:'PATCH',headers:authH(),body:JSON.stringify({id,done:t.done})}); }catch(e){}
}

async function deleteTask(id){
  tasks=tasks.filter(x=>x.id!==id); saveTasks(tasks); renderTasks();
  try{ await fetch(`/api/tasks?id=${id}`,{method:'DELETE',headers:authH()}); }catch(e){}
}

async function clearDone(){
  tasks=tasks.filter(t=>!t.done); saveTasks(tasks); renderTasks();
  try{ await fetch('/api/tasks',{method:'DELETE',headers:authH()}); }catch(e){}
}

// ── MISSIONS ──────────────────────────────────────────────────────────────────
function renderMissions(){
  const grid=document.getElementById('mission-grid');
  grid.innerHTML=''; let done=0;
  MISSIONS.forEach(m=>{
    const c=counts[m.id]||0, complete=c>=m.goal;
    if(complete) done++;
    const div=document.createElement('div');
    div.className='mission'+(complete?' done':'');
    div.innerHTML=`
      <div class="mission-tag" style="color:${m.color}">${m.tag}</div>
      <div class="mission-label">${m.label}</div>
      <div class="mission-count" style="color:${complete?m.color:'#555'}">${c}/${m.goal}</div>
      <div class="mission-btns">
        <button class="btn-dec" onclick="dec('${m.id}')" ${c===0?'style="opacity:.2;pointer-events:none"':''}>−1</button>
        <button class="btn-inc" onclick="inc('${m.id}')" ${complete?`style="background:${m.color};color:#000;border-color:${m.color}"`:''}>
          ${complete?'✓':'+1'}
        </button>
      </div>`;
    grid.appendChild(div);
  });
  document.getElementById('main-bar').style.width=Math.round(done/MISSIONS.length*100)+'%';
  document.getElementById('main-label').textContent=done+' / '+MISSIONS.length+' complete';
}

// ── TOOLS ─────────────────────────────────────────────────────────────────────
function renderTools(){
  const c=document.getElementById('tools-container'); c.innerHTML='';
  TOOL_CATS.forEach(cat=>{
    const sec=document.createElement('div'); sec.className='tool-category';
    const lbl=document.createElement('div'); lbl.className='tool-category-label';
    lbl.style.color=cat.color; lbl.textContent=cat.label; sec.appendChild(lbl);
    const grid=document.createElement('div'); grid.className='tools-grid';
    cat.tools.forEach(t=>{
      const live=t.status==='live', local=t.status==='local';
      const el=document.createElement('a');
      el.className='tool-card'+(live||local?'':' offline');
      el.style.setProperty('--card-accent',cat.color);
      if(t.url){el.href=t.url;el.target='_blank';el.rel='noopener';}
      el.innerHTML=`<div class="tool-name">${t.name}</div><div class="tool-desc">${t.desc}</div>
        <div class="tool-status ${live?'':local?'local':'offline-s'}">${live?'● Live':local?'◐ Local':'○ Offline'}</div>`;
      grid.appendChild(el);
    });
    sec.appendChild(grid); c.appendChild(sec);
  });
}

function inc(id){ const m=MISSIONS.find(x=>x.id===id); if((counts[id]||0)<m.goal){counts[id]=(counts[id]||0)+1;saveState(counts);renderMissions();} }
function dec(id){ if((counts[id]||0)>0){counts[id]--;saveState(counts);renderMissions();} }
function resetDay(){ if(!confirm("Reset today's progress?"))return; counts={};saveState(counts);renderMissions(); }

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const prev=localStorage.getItem('qhub_lastdate'), today=todayStr();
  if(prev&&prev!==today){counts={};saveState(counts);renderMissions();}
  localStorage.setItem('qhub_lastdate',today);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderTasks();
renderMissions();
renderTools();
updateClock();
setInterval(updateClock,1000);
syncFromServer();
setInterval(syncFromServer,30000);
</script>
</body>
</html>
