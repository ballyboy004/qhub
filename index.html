<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q · HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surface:#131315;--surface2:#1a1a1c;
  --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);
  --text:#ffffff;--muted:#52525b;--muted2:#3f3f46;
  --mono:'IBM Plex Mono',monospace;--inter:'Inter',sans-serif;
  --red:#ef4444;--green:#22c55e;--blue:#3b82f6;--purple:#a78bfa;--orange:#f97316;--yellow:#eab308;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;padding:32px 40px 80px;max-width:1400px;margin:0 auto;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.header-left .eyebrow{font-size:10px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.header-left .wordmark{font-family:var(--inter);font-size:22px;font-weight:900;letter-spacing:-0.02em;color:var(--text)}
.clock-block{text-align:right}
.clock{font-family:var(--inter);font-size:22px;font-weight:900;letter-spacing:-0.02em;color:var(--text);font-variant-numeric:tabular-nums}
.date-line{font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px}

/* ── LAUNCH BAR ── */
.launch-bar{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:10px 0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.launch-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:3px;background:var(--surface);transition:all 0.15s;white-space:nowrap}
.launch-link:hover{border-color:var(--border-hover);background:var(--surface2)}
.launch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.launch-name{font-size:10px;letter-spacing:0.08em;color:var(--text);text-transform:uppercase;font-weight:500}
.launch-divider{width:1px;height:16px;background:var(--border);margin:0 6px;flex-shrink:0}

/* ── REVENUE BAR ── */
.revenue-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:16px}
.rev-card{background:var(--surface);padding:18px 22px;cursor:pointer;transition:background 0.15s}
.rev-card:hover{background:var(--surface2)}
.rev-value{font-family:var(--inter);font-size:26px;font-weight:900;letter-spacing:-0.03em;color:var(--text);line-height:1;margin-bottom:5px}
.rev-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
.rev-sub{font-size:10px;color:var(--muted2);margin-top:3px}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:58fr 42fr;gap:16px;margin-bottom:16px}
.bottom-grid{display:grid;grid-template-columns:55fr 45fr;gap:16px;margin-bottom:16px}
.full-width{margin-bottom:16px}

/* ── SECTION LABEL ── */
.section-label{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}

/* ── BUTTONS ── */
.qbtn{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:7px 14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:4px;transition:all 0.15s;white-space:nowrap}
.qbtn:hover{border-color:var(--border-hover);color:var(--text)}
.qbtn.primary{background:var(--text);color:var(--bg);border-color:var(--text);font-family:var(--inter);font-weight:900;letter-spacing:-0.01em}
.qbtn.primary:hover{opacity:0.85}
.qbtn.primary:disabled{opacity:0.3;cursor:not-allowed}
.qbtn.danger:hover{border-color:var(--red);color:var(--red)}
.qbtn.sm{font-size:9px;padding:3px 10px}
.qbtn.recording{background:var(--red);color:#fff;border-color:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── SMART TASKS ── */
.dump-area{width:100%;font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px 14px;color:var(--text);outline:none;resize:none;min-height:58px;line-height:1.7;transition:border-color 0.15s;display:block}
.dump-area:focus{border-color:var(--border-hover)}
.dump-area::placeholder{color:var(--muted2)}
.dump-row{display:flex;gap:6px;margin-top:8px;margin-bottom:10px;flex-wrap:wrap}
.processing{font-size:10px;color:var(--muted);padding:4px 0;display:none}
.processing.active{display:block}
.task-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;max-height:360px;overflow-y:auto}
.task-item{display:grid;grid-template-columns:3px 1fr auto;align-items:start;background:var(--surface);transition:background 0.15s}
.task-item:hover{background:var(--surface2)}
.task-item.done-task{opacity:0.3}
.task-item.done-task .task-title{text-decoration:line-through}
.task-priority-bar{width:3px;align-self:stretch;flex-shrink:0}
.p1{background:var(--red)}.p2{background:var(--orange)}.p3{background:var(--green)}
.task-body{padding:9px 12px}
.task-meta{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.task-cat{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600}
.task-ts{font-size:8px;color:var(--muted)}
.task-title{font-size:11px;color:var(--text);line-height:1.5}
.task-note{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
.task-actions{display:flex;align-items:center;gap:4px;padding:9px 10px}
.task-check{background:none;border:1px solid var(--border);border-radius:3px;width:18px;height:18px;cursor:pointer;color:var(--muted);font-size:9px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0}
.task-check:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
.task-item.done-task .task-check{background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--border-hover)}
.task-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;padding:0;line-height:1;transition:color 0.12s}
.task-item:hover .task-del{color:var(--muted2)}
.task-del:hover{color:var(--red)!important}
.tasks-empty{font-size:10px;color:var(--muted);padding:14px;letter-spacing:0.04em}

/* ── MISSIONS ── */
.mission-grid{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.mission{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;background:var(--surface);padding:11px 14px;transition:background 0.15s}
.mission:hover{background:var(--surface2)}
.mission.done{background:var(--surface2)}
.mission-left{display:flex;flex-direction:column;gap:2px}
.mission-tag{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600}
.mission-label{font-size:11px;color:var(--text)}
.mission.done .mission-label{color:var(--muted)}
.mission-count{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--muted);min-width:28px;text-align:right}
.mission.done .mission-count{color:var(--text)}
.mission-btns{display:flex;gap:4px}
.btn-inc,.btn-dec{font-family:var(--mono);font-size:10px;font-weight:600;border:1px solid var(--border);border-radius:3px;padding:2px 8px;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.12s}
.btn-inc:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-dec:hover{background:var(--surface2);color:var(--text)}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-track{flex:1;height:1px;background:var(--border);border-radius:1px;overflow:hidden}
.bar-fill{height:100%;background:var(--text);border-radius:1px;transition:width 0.4s ease}
.bar-label{font-size:9px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;letter-spacing:0.1em}

/* ── PIPELINE ── */
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.pipe-col{background:var(--surface);padding:14px}
.pipe-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pipe-stage-name{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
.pipe-count{font-family:var(--inter);font-size:20px;font-weight:900;letter-spacing:-0.02em;color:var(--text)}
.pipe-leads{display:flex;flex-direction:column;gap:3px;min-height:24px}
.pipe-lead{font-size:9px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:4px 7px;display:flex;align-items:center;justify-content:space-between;gap:4px;transition:border-color 0.12s}
.pipe-lead:hover{border-color:var(--border-hover)}
.pipe-lead span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pipe-lead-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;flex-shrink:0;transition:color 0.12s}
.pipe-lead:hover .pipe-lead-del{color:var(--muted2)}
.pipe-lead-del:hover{color:var(--red)!important}
.pipe-add-row{display:flex;gap:4px;margin-top:8px}
.pipe-input{font-family:var(--mono);font-size:9px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:4px 7px;color:var(--text);outline:none;flex:1;min-width:0;transition:border-color 0.15s}
.pipe-input:focus{border-color:var(--border-hover)}
.pipe-input::placeholder{color:var(--muted2)}
.pipe-add-btn{font-family:var(--mono);font-size:10px;border:1px solid var(--border);border-radius:3px;padding:4px 8px;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.12s;flex-shrink:0}
.pipe-add-btn:hover{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ── OUTREACH ── */
.outreach-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;max-height:280px;overflow-y:auto}
.outreach-item{display:grid;grid-template-columns:1fr 80px 100px auto;align-items:center;gap:10px;background:var(--surface);padding:9px 12px;transition:background 0.15s}
.outreach-item:hover{background:var(--surface2)}
.outreach-handle{font-size:11px;color:var(--text)}
.outreach-price{font-size:10px;color:var(--muted)}
.outreach-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;padding:0;transition:color 0.12s}
.outreach-item:hover .outreach-del{color:var(--muted2)}
.outreach-del:hover{color:var(--red)!important}
.outreach-add-row{display:grid;grid-template-columns:1fr 90px 110px auto;gap:6px;margin-top:10px}
.field-input{font-family:var(--mono);font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);outline:none;transition:border-color 0.15s}
.field-input:focus{border-color:var(--border-hover)}
.field-input::placeholder{color:var(--muted2)}
.field-select{font-family:var(--mono);font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:7px 8px;color:var(--text);outline:none;cursor:pointer}
.field-select option{background:var(--bg)}

/* ── BEAT LOG ── */
.beat-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;max-height:280px;overflow-y:auto}
.beat-item{display:grid;grid-template-columns:60px 1fr 90px auto;align-items:center;gap:10px;background:var(--surface);padding:9px 12px;transition:background 0.15s}
.beat-item:hover{background:var(--surface2)}
.beat-date{font-size:9px;color:var(--muted2)}
.beat-name{font-size:11px;color:var(--text)}
.beat-vibe{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);border-radius:2px;padding:2px 6px;display:inline-block}
.beat-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;padding:0;transition:color 0.12s}
.beat-item:hover .beat-del{color:var(--muted2)}
.beat-del:hover{color:var(--red)!important}
.beat-add-row{display:grid;grid-template-columns:1fr 100px auto;gap:6px;margin-top:10px}
.empty-state{font-size:10px;color:var(--muted);padding:14px;letter-spacing:0.04em}

/* ── FOOTER ── */
.footer{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid var(--border)}
.footer-text{font-size:10px;color:var(--muted2);letter-spacing:0.15em;text-transform:uppercase}
.reset-btn{font-family:var(--mono);font-size:10px;background:none;border:none;color:var(--muted2);cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s}
.reset-btn:hover{color:var(--red)}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.header{animation:fadeUp 0.25s ease both}
.launch-bar{animation:fadeUp 0.25s ease 0.03s both}
.revenue-bar{animation:fadeUp 0.25s ease 0.05s both}
.main-grid,.full-width,.bottom-grid{animation:fadeUp 0.25s ease 0.07s both}

@media(max-width:900px){
  html,body{padding:20px 16px 60px}
  .main-grid,.bottom-grid{grid-template-columns:1fr}
  .pipeline{grid-template-columns:repeat(3,1fr)}
  .revenue-bar{grid-template-columns:repeat(2,1fr)}
  .clock{font-size:18px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="eyebrow">Samuel Quinn Gilmore</div>
    <div class="wordmark">Q · HUB</div>
  </div>
  <div class="clock-block">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-line" id="date"></div>
  </div>
</header>

<!-- ── LAUNCH BAR ── -->
<nav class="launch-bar" id="launch-bar"></nav>

<!-- ── REVENUE ── -->
<div class="revenue-bar">
  <div class="rev-card" title="Double-click to edit">
    <div class="rev-value" id="rev-mrr">$0</div>
    <div class="rev-label">Noctive MRR</div>
    <div class="rev-sub" id="rev-clients">0 clients</div>
  </div>
  <div class="rev-card" title="Double-click to edit">
    <div class="rev-value" id="rev-beats">$0</div>
    <div class="rev-label">Beat Sales</div>
    <div class="rev-sub" id="rev-beats-count">0 sales</div>
  </div>
  <div class="rev-card" title="Double-click to edit">
    <div class="rev-value" id="rev-other">$0</div>
    <div class="rev-label">Other Income</div>
    <div class="rev-sub">one-time / misc</div>
  </div>
  <div class="rev-card">
    <div class="rev-value" id="rev-total">$0</div>
    <div class="rev-label">Total This Month</div>
    <div class="rev-sub" id="rev-goal">Goal: $497</div>
  </div>
</div>

<!-- ── TASKS + MISSIONS ── -->
<div class="main-grid">
  <div>
    <div class="section-label">
      <span>Smart tasks</span>
      <div style="display:flex;gap:5px">
        <button class="qbtn sm" id="sync-btn" onclick="manualSync()">↻ Sync</button>
        <button class="qbtn sm danger" onclick="clearDone()">Clear done</button>
      </div>
    </div>
    <textarea class="dump-area" id="dump-area" placeholder="Brain dump — Claude turns it into prioritized tasks."></textarea>
    <div class="dump-row">
      <button class="qbtn" id="voice-btn" onclick="toggleVoice()">🎙 Voice</button>
      <button class="qbtn primary" id="process-btn" onclick="processDump()">⚡ Process</button>
    </div>
    <div class="processing" id="proc-ind">Processing...</div>
    <div class="task-list" id="task-list"></div>
  </div>
  <div>
    <div class="section-label">
      <span>Daily missions</span>
      <span class="bar-label" id="main-label">0 / 5</span>
    </div>
    <div class="bar-row">
      <div class="bar-track"><div class="bar-fill" id="main-bar" style="width:0%"></div></div>
    </div>
    <div class="mission-grid" id="mission-grid"></div>
  </div>
</div>

<!-- ── PIPELINE ── -->
<div class="full-width">
  <div class="section-label">Noctive pipeline</div>
  <div class="pipeline" id="pipeline"></div>
</div>

<!-- ── OUTREACH + BEAT LOG ── -->
<div class="bottom-grid">
  <div>
    <div class="section-label">
      <span>TikTok outreach</span>
      <span id="outreach-stats" style="font-size:9px;color:var(--muted)"></span>
    </div>
    <div class="outreach-list" id="outreach-grid"></div>
    <div class="outreach-add-row">
      <input class="field-input" id="out-handle" placeholder="@handle" />
      <input class="field-input" id="out-price" placeholder="Price" />
      <select class="field-select" id="out-status">
        <option value="waiting">Waiting</option>
        <option value="quoted">Quoted</option>
        <option value="sent">Beat Sent</option>
        <option value="posted">Posted ✓</option>
        <option value="pass">Pass</option>
      </select>
      <button class="qbtn primary" onclick="addOutreach()">+</button>
    </div>
  </div>
  <div>
    <div class="section-label">
      <span>Beat log</span>
      <span id="beat-stats" style="font-size:9px;color:var(--muted)"></span>
    </div>
    <div class="beat-list" id="beat-grid"></div>
    <div class="beat-add-row">
      <input class="field-input" id="beat-name" placeholder="Beat name / vibe" />
      <input class="field-input" id="beat-vibe" placeholder="Genre" />
      <button class="qbtn primary" onclick="addBeat()">+ Log</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-text">Resets at midnight · noctive.io</div>
  <button class="reset-btn" onclick="resetDay()">Reset today</button>
</footer>

<script>
const SECRET = 'qhub-samuel-2026-noctive';

const TOOL_CATS = [
  { color:'#3b82f6', tools:[
    {name:'Lead Engine', url:'https://noctive-lead-engine-dztnw3c87n2iz5tyse52aw.streamlit.app/', status:'live'},
    {name:'Instantly',   url:'https://app.instantly.ai', status:'live'},
    {name:'Noctive',     url:'https://noctive.io', status:'live'},
  ]},
  { color:'#a78bfa', tools:[
    {name:'Network Finder',   url:'https://blkbox-network.vercel.app/', status:'live'},
    {name:'Influencer Scout', url:'https://blkbx-influencer-scout-90osf6fud.vercel.app/', status:'live'},
  ]},
  { color:'#eab308', tools:[
    {name:'Job Scout', url:'http://localhost:8000', status:'local'},
  ]},
];

const MISSIONS = [
  {id:'jobs',    tag:'Income',  label:'Apply to 5 jobs',            goal:5, color:'#eab308'},
  {id:'emails',  tag:'Noctive', label:'Check email campaign',        goal:1, color:'#3b82f6'},
  {id:'beat',    tag:'Music',   label:'Make a beat',                 goal:1, color:'#a78bfa'},
  {id:'network', tag:'Network', label:'Reach out to 5 producers',   goal:5, color:'#22c55e'},
  {id:'promo',   tag:'Promo',   label:'Hit 5 influencers for promo', goal:5, color:'#f97316'},
];

const PIPE_STAGES=[
  {id:'emailed',label:'Emailed'},{id:'opened',label:'Opened'},
  {id:'replied',label:'Replied'},{id:'demo',label:'Demo'},{id:'closed',label:'Closed'},
];

const CAT_COLORS={
  Noctive:'#3b82f6',Music:'#a78bfa',Income:'#eab308',
  Network:'#22c55e',Promo:'#f97316',BLACKBOX:'#ffffff',Life:'#71717a',General:'#52525b',
};

const DAY_KEY='qhub_v1',TASKS_KEY='qhub_tasks_v2',PIPE_KEY='qhub_pipeline',
      OUTREACH_KEY='qhub_outreach',BEATS_KEY='qhub_beats',REVENUE_KEY='qhub_revenue';

function todayStr(){ return new Date().toISOString().slice(0,10); }
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(DAY_KEY)||'{}'); if(s.date===todayStr()) return s.counts||{}; }catch(e){}
  return {};
}
function saveState(c){ localStorage.setItem(DAY_KEY,JSON.stringify({date:todayStr(),counts:c})); }
let counts=loadState();
function load(k,d){ try{ return JSON.parse(localStorage.getItem(k)||'null')||d; }catch(e){ return d; } }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

let tasks    = load(TASKS_KEY,[]);
let pipeline = load(PIPE_KEY,{emailed:[],opened:[],replied:[],demo:[],closed:[]});
let outreach = load(OUTREACH_KEY,[]);
let beats    = load(BEATS_KEY,[]);
let revenue  = load(REVENUE_KEY,{mrr:0,clients:0,beatSales:0,beatCount:0,other:0});

function authH(){ return {'Content-Type':'application/json','x-qhub-token':SECRET}; }

// ── LAUNCH BAR ────────────────────────────────────────────────────────────────
function renderLaunchBar(){
  const bar=document.getElementById('launch-bar');
  bar.innerHTML='';
  TOOL_CATS.forEach((cat,ci)=>{
    if(ci>0){ const d=document.createElement('div'); d.className='launch-divider'; bar.appendChild(d); }
    cat.tools.forEach(t=>{
      const live=t.status==='live',local=t.status==='local';
      const a=document.createElement('a');
      a.className='launch-link'+(live||local?'':' offline');
      if(t.url){a.href=t.url;a.target='_blank';a.rel='noopener';}
      a.innerHTML=`<span class="launch-dot" style="background:${live?cat.color:local?'#4b5563':'#27272a'}"></span><span class="launch-name">${t.name}</span>`;
      bar.appendChild(a);
    });
  });
}

// ── REVENUE ───────────────────────────────────────────────────────────────────
function renderRevenue(){
  const total=revenue.mrr+revenue.beatSales+revenue.other;
  document.getElementById('rev-mrr').textContent    ='$'+revenue.mrr.toLocaleString();
  document.getElementById('rev-clients').textContent =revenue.clients+' client'+(revenue.clients!==1?'s':'');
  document.getElementById('rev-beats').textContent   ='$'+revenue.beatSales.toLocaleString();
  document.getElementById('rev-beats-count').textContent=revenue.beatCount+' sale'+(revenue.beatCount!==1?'s':'');
  document.getElementById('rev-other').textContent   ='$'+revenue.other.toLocaleString();
  document.getElementById('rev-total').textContent   ='$'+total.toLocaleString();
  document.getElementById('rev-goal').textContent    =revenue.clients===0?'Goal: $497 (1 client)':'Goal: $'+(497*(revenue.clients+1)).toLocaleString();
}
document.querySelectorAll('.rev-card').forEach((card,i)=>{
  card.addEventListener('dblclick',()=>{
    if(i===0){const v=prompt('MRR ($):',revenue.mrr),c=prompt('Clients:',revenue.clients);if(v!==null)revenue.mrr=parseInt(v)||0;if(c!==null)revenue.clients=parseInt(c)||0;}
    else if(i===1){const v=prompt('Beat sales ($):',revenue.beatSales),c=prompt('# sales:',revenue.beatCount);if(v!==null)revenue.beatSales=parseInt(v)||0;if(c!==null)revenue.beatCount=parseInt(c)||0;}
    else if(i===2){const v=prompt('Other ($):',revenue.other);if(v!==null)revenue.other=parseInt(v)||0;}
    save(REVENUE_KEY,revenue);renderRevenue();
  });
});

// ── VOICE ─────────────────────────────────────────────────────────────────────
let recognition=null,isRecording=false;
function toggleVoice(){
  const btn=document.getElementById('voice-btn');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice requires Chrome.');return;}
  if(isRecording){recognition.stop();return;}
  recognition=new SR();recognition.continuous=true;recognition.interimResults=false;recognition.lang='en-US';
  recognition.onstart=()=>{isRecording=true;btn.textContent='⏹ Stop';btn.classList.add('recording');};
  recognition.onresult=(e)=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript+' ';const a=document.getElementById('dump-area');a.value=(a.value+' '+t.trim()).trim();};
  recognition.onend=()=>{isRecording=false;btn.textContent='🎙 Voice';btn.classList.remove('recording');};
  recognition.onerror=()=>{isRecording=false;btn.textContent='🎙 Voice';btn.classList.remove('recording');};
  recognition.start();
}

// ── PROCESS ───────────────────────────────────────────────────────────────────
async function processDump(){
  const raw=document.getElementById('dump-area').value.trim();
  if(!raw){alert('Nothing to process.');return;}
  const btn=document.getElementById('process-btn'),ind=document.getElementById('proc-ind');
  btn.disabled=true;ind.classList.add('active');
  try{
    const res=await fetch('/api/voice',{method:'POST',headers:authH(),body:JSON.stringify({text:raw})});
    if(!res.ok)throw new Error('Server error '+res.status);
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'Unknown error');
    await syncFromServer();
    document.getElementById('dump-area').value='';
  }catch(e){alert('Error: '+e.message);}
  finally{btn.disabled=false;ind.classList.remove('active');}
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function syncFromServer(){
  try{
    const res=await fetch('/api/tasks',{headers:authH()});
    if(!res.ok)return;
    const st=await res.json();
    if(!Array.isArray(st))return;
    const sids=new Set(st.map(t=>t.id));
    tasks=[...st,...tasks.filter(t=>!sids.has(t.id))];
    save(TASKS_KEY,tasks);renderTasks();
  }catch(e){}
}
async function manualSync(){
  const btn=document.getElementById('sync-btn');
  btn.textContent='↻';
  await syncFromServer();
  btn.textContent='↻ Sync';
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderTasks(){
  const list=document.getElementById('task-list');
  const v=[...tasks.filter(t=>!t.done),...tasks.filter(t=>t.done)];
  if(!v.length){list.innerHTML='<div class="tasks-empty">No tasks yet — dump your thoughts above.</div>';return;}
  list.innerHTML=v.map(t=>`
    <div class="task-item${t.done?' done-task':''}">
      <div class="task-priority-bar p${t.priority}"></div>
      <div class="task-body">
        <div class="task-meta">
          <span class="task-cat" style="color:${CAT_COLORS[t.category]||'#52525b'}">${t.category}</span>
          <span class="task-ts">${t.date} ${t.time}</span>
        </div>
        <div class="task-title">${esc(t.title)}</div>
        ${t.note?`<div class="task-note">${esc(t.note)}</div>`:''}
      </div>
      <div class="task-actions">
        <button class="task-check" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
        <button class="task-del" onclick="deleteTask('${t.id}')">×</button>
      </div>
    </div>`).join('');
}
async function toggleTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;save(TASKS_KEY,tasks);renderTasks();
  try{await fetch('/api/tasks',{method:'PATCH',headers:authH(),body:JSON.stringify({id,done:t.done})});}catch(e){}
}
async function deleteTask(id){
  tasks=tasks.filter(x=>x.id!==id);save(TASKS_KEY,tasks);renderTasks();
  try{await fetch(`/api/tasks?id=${id}`,{method:'DELETE',headers:authH()});}catch(e){}
}
async function clearDone(){
  tasks=tasks.filter(t=>!t.done);save(TASKS_KEY,tasks);renderTasks();
  try{await fetch('/api/tasks',{method:'DELETE',headers:authH()});}catch(e){}
}

// ── MISSIONS ──────────────────────────────────────────────────────────────────
function renderMissions(){
  const grid=document.getElementById('mission-grid');
  grid.innerHTML='';let done=0;
  MISSIONS.forEach(m=>{
    const c=counts[m.id]||0,complete=c>=m.goal;
    if(complete)done++;
    const div=document.createElement('div');
    div.className='mission'+(complete?' done':'');
    div.innerHTML=`
      <div class="mission-left">
        <div class="mission-tag" style="color:${m.color}">${m.tag}</div>
        <div class="mission-label">${m.label}</div>
      </div>
      <div class="mission-count">${c}/${m.goal}</div>
      <div class="mission-btns">
        <button class="btn-dec" onclick="dec('${m.id}')" ${c===0?'style="opacity:.2;pointer-events:none"':''}>−</button>
        <button class="btn-inc" onclick="inc('${m.id}')">${complete?'✓':'+'}</button>
      </div>`;
    grid.appendChild(div);
  });
  document.getElementById('main-bar').style.width=Math.round(done/MISSIONS.length*100)+'%';
  document.getElementById('main-label').textContent=done+' / '+MISSIONS.length;
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
function renderPipeline(){
  const container=document.getElementById('pipeline');
  container.innerHTML='';
  PIPE_STAGES.forEach(stage=>{
    const leads=pipeline[stage.id]||[];
    const col=document.createElement('div');
    col.className='pipe-col';
    col.innerHTML=`
      <div class="pipe-col-header">
        <span class="pipe-stage-name">${stage.label}</span>
        <span class="pipe-count">${leads.length}</span>
      </div>
      <div class="pipe-leads">
        ${leads.map((l,i)=>`<div class="pipe-lead"><span>${esc(l)}</span><button class="pipe-lead-del" onclick="removeLead('${stage.id}',${i})">×</button></div>`).join('')}
      </div>
      <div class="pipe-add-row">
        <input class="pipe-input" id="pipe-input-${stage.id}" placeholder="Add company" onkeydown="if(event.key==='Enter')addLead('${stage.id}')" />
        <button class="pipe-add-btn" onclick="addLead('${stage.id}')">+</button>
      </div>`;
    container.appendChild(col);
  });
}
function addLead(s){const i=document.getElementById('pipe-input-'+s);const v=i.value.trim();if(!v)return;pipeline[s]=[...(pipeline[s]||[]),v];i.value='';save(PIPE_KEY,pipeline);renderPipeline();}
function removeLead(s,idx){pipeline[s]=(pipeline[s]||[]).filter((_,i)=>i!==idx);save(PIPE_KEY,pipeline);renderPipeline();}

// ── OUTREACH ──────────────────────────────────────────────────────────────────
function renderOutreach(){
  const grid=document.getElementById('outreach-grid');
  const stats=document.getElementById('outreach-stats');
  stats.textContent=outreach.length+' pages · '+outreach.filter(o=>o.status==='posted').length+' posted';
  if(!outreach.length){grid.innerHTML='<div class="empty-state">No outreach logged yet.</div>';return;}
  const sm={waiting:'Waiting',quoted:'Quoted',sent:'Beat Sent',posted:'Posted ✓',pass:'Pass'};
  grid.innerHTML=outreach.map((o,i)=>`
    <div class="outreach-item">
      <div class="outreach-handle">${esc(o.handle)}</div>
      <div class="outreach-price">${esc(o.price||'—')}</div>
      <div>
        <select class="field-select" style="font-size:9px;padding:2px 6px" onchange="updateOutreachStatus(${i},this.value)">
          ${['waiting','quoted','sent','posted','pass'].map(s=>`<option value="${s}"${o.status===s?' selected':''}>${sm[s]}</option>`).join('')}
        </select>
      </div>
      <button class="outreach-del" onclick="deleteOutreach(${i})">×</button>
    </div>`).join('');
}
function addOutreach(){
  const h=document.getElementById('out-handle').value.trim();if(!h)return;
  outreach.unshift({handle:h,price:document.getElementById('out-price').value.trim(),status:document.getElementById('out-status').value,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})});
  document.getElementById('out-handle').value='';document.getElementById('out-price').value='';
  save(OUTREACH_KEY,outreach);renderOutreach();
}
function updateOutreachStatus(i,s){outreach[i].status=s;save(OUTREACH_KEY,outreach);renderOutreach();}
function deleteOutreach(i){outreach.splice(i,1);save(OUTREACH_KEY,outreach);renderOutreach();}

// ── BEAT LOG ──────────────────────────────────────────────────────────────────
function renderBeats(){
  const grid=document.getElementById('beat-grid');
  document.getElementById('beat-stats').textContent=beats.length+' beat'+(beats.length!==1?'s':'')+' logged';
  if(!beats.length){grid.innerHTML='<div class="empty-state">No beats logged yet.</div>';return;}
  grid.innerHTML=beats.map((b,i)=>`
    <div class="beat-item">
      <div class="beat-date">${b.date}</div>
      <div class="beat-name">${esc(b.name)}</div>
      <div><span class="beat-vibe">${esc(b.vibe)}</span></div>
      <button class="beat-del" onclick="deleteBeat(${i})">×</button>
    </div>`).join('');
}
function addBeat(){
  const n=document.getElementById('beat-name').value.trim();if(!n)return;
  beats.unshift({name:n,vibe:document.getElementById('beat-vibe').value.trim()||'beat',date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})});
  document.getElementById('beat-name').value='';document.getElementById('beat-vibe').value='';
  save(BEATS_KEY,beats);renderBeats();
  if((counts['beat']||0)<1){counts['beat']=1;saveState(counts);renderMissions();}
}
function deleteBeat(i){beats.splice(i,1);save(BEATS_KEY,beats);renderBeats();}

function inc(id){const m=MISSIONS.find(x=>x.id===id);if((counts[id]||0)<m.goal){counts[id]=(counts[id]||0)+1;saveState(counts);renderMissions();}}
function dec(id){if((counts[id]||0)>0){counts[id]--;saveState(counts);renderMissions();}}
function resetDay(){if(!confirm("Reset today's progress?"))return;counts={};saveState(counts);renderMissions();}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const prev=localStorage.getItem('qhub_lastdate'),today=todayStr();
  if(prev&&prev!==today){counts={};saveState(counts);renderMissions();}
  localStorage.setItem('qhub_lastdate',today);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderLaunchBar();
renderRevenue();
renderTasks();
renderMissions();
renderPipeline();
renderOutreach();
renderBeats();
updateClock();
setInterval(updateClock,1000);
syncFromServer();
setInterval(syncFromServer,5000);
</script>
